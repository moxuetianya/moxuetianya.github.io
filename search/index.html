  <div class="searchd" style="max-width:500px;margin-bottom:1em;">
    <input id="pagesearchinput" type="text" placeholder="搜索" title="Search" autofocus />

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var query = params.get('q');
  var input = document.getElementById('pagesearchinput');
  var resultsDiv = document.getElementById('pageresults');

  function doSearch() {
    var q = input.value.trim();
    if (!q) return;
    window.location.search = '?q=' + encodeURIComponent(q);
  }
  window.doSearch = doSearch;

  input.addEventListener('keydown', function(e) {
    if (e.keyCode === 13) { e.preventDefault(); doSearch(); }
  });

  if (query) {
    input.value = query;
    var checkReady = setInterval(function() {
      if (typeof elasticlunr !== 'undefined' && typeof window.searchIndex !== 'undefined') {
        clearInterval(checkReady);
        var idx = elasticlunr.Index.load(window.searchIndex);
        var results = idx.search(query, {
          bool: "OR",
          expand: true,
          fields: {
            title: {boost: 2},
            body: {boost: 1}
          }
        });

        if (results.length === 0) {
          resultsDiv.innerHTML = '<p>未找到与 "<b>' + query + '</b>" 相关的文章</p>';
          return;
        }

        var html = '<p>找到 <b>' + results.length + '</b> 篇相关文章：</p>';
        results.forEach(function(r) {
          var title = r.doc.title || '(无标题)';
          var body = r.doc.body || '';
          body = body.replace(/<[^>]*>/g, '').substring(0, 200);
          html += '<div class="blockdiv" style="margin-bottom:1em;">';
          html += '<a class="b s120" href="' + r.ref + '">' + title + '</a>';
          html += '<p class="s90">' + body + '...</p>';
          html += '</div>';
        });
        resultsDiv.innerHTML = html;
      }
    }, 100);
  } else {
    resultsDiv.innerHTML = '<p>输入关键词搜索文章</p>';
  }
})();
</script>
